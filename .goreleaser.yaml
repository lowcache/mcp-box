version: 2
project_name: mcp-box

before:
  hooks:
    - sh -c "cd ./src/go && go mod tidy"

builds:
  - env:
      - CGO_ENABLED=0
    dir: ./src/go
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    main: ./main.go
    binary: mcp-box

archives:
  - format: binary
    name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"
